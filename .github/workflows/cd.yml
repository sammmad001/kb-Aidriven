name: CD (Deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload scripts
        run: |
          for script in backup.sh deploy.sh rollback.sh pre-deploy-check.sh; do
            if [ -f "$script" ]; then
              scp -o ConnectTimeout=10 "$script" ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/knowledge-base/
            fi
          done
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "chmod +x /opt/knowledge-base/*.sh 2>/dev/null || true"

      - name: Backup on ECS
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "cd /opt/knowledge-base && bash backup.sh"

      - name: Upload backend code
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='raw/sources/*' \
            --exclude='wiki/*' \
            --exclude='tests/' \
            --exclude='data/' \
            -e "ssh -o ConnectTimeout=10" \
            kb/ ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/knowledge-base/

      - name: Install dependencies
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "cd /opt/knowledge-base && source venv/bin/activate 2>/dev/null && pip install -r requirements.txt -q 2>/dev/null || true"

      - name: Restart service
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "systemctl restart knowledge-base"

      - name: Health check
        run: |
          echo "等待服务启动..."
          sleep 5
          for i in $(seq 1 3); do
            echo "  健康检查 $i/3..."
            if curl -sf http://${{ secrets.ECS_HOST }}:8080/health 2>/dev/null | grep -q ok; then
              echo "✅ 健康检查通过"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 健康检查失败，查看服务日志："
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "journalctl -u knowledge-base --no-pager -n 30"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️  部署失败，执行自动回滚..."
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "cd /opt/knowledge-base && bash rollback.sh --code-only"
          echo "✅ 已回滚到上一个版本"

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## 🚀 部署成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 部署失败 (已自动回滚)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS**: ${{ secrets.ECS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
