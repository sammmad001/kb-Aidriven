name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd kb
          pip install -r requirements.txt
      - name: Compile check
        working-directory: kb
        run: find app -name "*.py" -exec python3 -m py_compile {} \;
      - name: Run pytest
        working-directory: kb
        env:
          PYTHONPATH: ${{ github.workspace }}/kb
        run: python3 -m pytest tests/ -v --tb=long

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd kb-web && npm ci
      - name: TypeScript check
        run: cd kb-web && npx tsc -b --noEmit
      - name: Build
        run: cd kb-web && npm run build

  deploy:
    name: Deploy to ECS
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    # 仅在 push 到 main 时部署，PR 不触发部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload scripts first
        run: |
          for script in backup.sh deploy.sh rollback.sh pre-deploy-check.sh; do
            if [ -f "$script" ]; then
              scp -o ConnectTimeout=10 "$script" ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/knowledge-base/
            fi
          done
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "chmod +x /opt/knowledge-base/*.sh 2>/dev/null || true"

      - name: Backup on ECS
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "cd /opt/knowledge-base && ./backup.sh"

      - name: Upload backend code
        run: |
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='raw/sources/*' \
            --exclude='wiki/*' \
            -e "ssh -o ConnectTimeout=10" \
            kb/ ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/knowledge-base/kb/

      - name: Upload frontend build
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "mkdir -p /opt/knowledge-base/kb-web/dist"
          rsync -avz --delete \
            -e "ssh -o ConnectTimeout=10" \
            kb-web/dist/ ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/knowledge-base/kb-web/dist/

      - name: Install dependencies (if changed)
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "cd /opt/knowledge-base/kb && pip install -r requirements.txt -q"

      - name: Restart service
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "systemctl restart knowledge-base"

      - name: Health check
        run: |
          echo "等待服务启动..."
          sleep 5
          for i in {1..5}; do
            if curl -sf http://${{ secrets.ECS_HOST }}:8080/health | grep -q ok; then
              echo "✅ 健康检查通过"
              exit 0
            fi
            echo "  尝试 $i/5..."
            sleep 3
          done
          echo "❌ 健康检查失败"
          ssh -o ConnectTimeout=10 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "journalctl -u knowledge-base --no-pager -n 20"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "## 🚀 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS**: ${{ secrets.ECS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
